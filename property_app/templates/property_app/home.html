{% extends 'property_app/base.html' %}
{% load static %}

{% block content %}
<style>
    body {
        background: url("{% static 'property_app/images/beach-hero-photo.webp' %}") no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
        position: relative;
    }


    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.66);
        z-index: -1;
    }

    .glass-search-card {
        background-color: rgba(255, 255, 255, 0.95) !important;
        backdrop-filter: blur(4px);
    }
</style>

<div class="container d-flex flex-column justify-content-center align-items-center" style="min-height: 75vh;">

    <div class="text-center text-white mb-5">
        <h1 class="display-3 fw-bold text-white mb-3">Vacation Rentals are Yours to Discover</h1>
        <p class="lead text-white-50 fs-3">Compare & Book Vacation Rentals instantly.</p>
    </div>

    <div class="card shadow-lg border-0 p-4 rounded-3 w-100 glass-search-card text-dark text-start"
        style="max-width: 850px;">
        <h5 class="mb-3 text-dark fw-bold">Search Destination Properties</h5>
        <form method="GET" action="{% url 'property_listing' %}">
            <div class="row g-3 align-items-center">
                <div class="col-md-9">
                    <input type="text" name="q" class="form-control search-box-input py-2"
                        placeholder="Where do you want to go?" aria-label="Property Search Field">
                </div>
                <div class="col-md-3">
                    <button type="submit"
                        class="btn btn-dark w-100 py-2 fw-medium btn-search-stays d-flex align-items-center justify-content-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-search" viewBox="0 0 16 16">
                            <path
                                d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
                        </svg>
                        Search Stays
                    </button>
                </div>
            </div>
        </form>
    </div>

</div>
{% endblock %}
